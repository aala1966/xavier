<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XAVIER DRONEWORKS – capturando novos horizontes</title>

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Bandeiras (flag-icons) igual ao THULLIUM -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css" />

  <style>
    :root {
      --bg: #f3f1ed;
      --surface: #ffffff;
      --text: #111111;
      --muted: #666666;
      --line: #e4dfd8;
      --accent: #f5953b;
      --accent-dark: #d76d12;
      --accent-2: #0f6fd8;
      --shadow: 0 14px 40px rgba(0,0,0,.08);
      --radius: 18px;
      --container: 1320px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', Arial, sans-serif;
      line-height: 1.65;
    }

    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }

    .container {
      width: min(calc(100% - 32px), var(--container));
      margin: 0 auto;
    }

    /* TOPO / NAV */

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-block: 6px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 220px;
    }

    /* LOGO DISCRETO */
    .brand-logo {
      width: 80px;           /* tamanho reduzido */
      height: auto;
      margin-bottom: 4px;
      opacity: 0.9;          /* ligeiramente discreto */
    }

    .brand-title {
      font-family: 'Oswald', sans-serif;
      font-size: 1.8rem;
      line-height: 1;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .brand-sub {
      font-size: .8rem;
      letter-spacing: .26em;
      text-transform: uppercase;
      color: #333;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    /* LÍNGUAS – BANDEIRAS ESTILO THULLIUM */

    .lang-switcher {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex-wrap: wrap;
    }

    .lang-btn {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.08);
      background: #ffffff;
      box-shadow: 0 8px 18px rgba(15,23,42,0.12);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
    }

    .lang-btn .fi {
      width: 22px;
      height: 16px;
      border-radius: 3px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.06);
    }

    .lang-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(245,149,59,0.7);
      box-shadow: 0 10px 22px rgba(15,23,42,0.18);
    }

    .lang-btn.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(245,149,59,0.35);
      transform: translateY(-1px);
    }

    .menu {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      font-family: 'Oswald', sans-serif;
      text-transform: uppercase;
      letter-spacing: .06em;
      font-size: 0.9rem;
    }

    .menu a {
      padding: 6px 4px;
      border-bottom: 2px solid transparent;
    }

    .menu a:hover { border-color: var(--accent); }

    .nav-cta {
      border: 2px solid #1d1d1d;
      padding: 6px 14px;
      font-family: 'Oswald', sans-serif;
      text-transform: uppercase;
      letter-spacing: .08em;
      background: white;
      font-size: .8rem;
      white-space: nowrap;
    }

    /* HERO */

    .hero {
      padding: 22px 0 28px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 0.9fr 0.9fr 1.2fr;
      align-items: stretch;
      gap: 26px;
    }

    .panel-red {
      background: linear-gradient(150deg, var(--accent), var(--accent-dark));
      color: white;
      padding: 32px 26px;
      min-height: 520px; /* reduzido */
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel-red::before,
    .panel-red::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,.12);
      width: 36px;
      height: 36px;
    }
    .panel-red::before { top: 20px; left: 22px; }
    .panel-red::after { top: 76px; right: 40px; }

    .eyebrow {
      font-family: 'Oswald', sans-serif;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-size: 0.95rem;
      margin-bottom: 20px;
      opacity: .95;
    }

    .big-title {
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      line-height: 1.15;
      text-transform: uppercase;
      letter-spacing: .03em;
      margin: 0 0 16px;
    }

    .big-title span {
      display: block;
    }

    .panel-red p {
      font-size: 1.02rem;
      max-width: 26ch;
      color: rgba(255,255,255,.9);
      margin: 0 0 14px;
    }

    .panel-photo {
      min-height: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .photo-frame {
      background: #ddd;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      max-width: 360px;
      width: 100%;
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .panel-text {
      min-height: 520px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10px 10px 10px 2px;
    }

    .intro-mini {
      color: #a06c62;
      font-style: italic;
      font-size: 1.2rem;
      margin-bottom: 18px;
    }

    .side-title {
      font-family: 'Oswald', sans-serif;
      text-transform: uppercase;
      font-size: clamp(2rem, 3vw, 3.2rem);
      line-height: .98;
      margin: 0 0 20px;
      max-width: 14ch;
    }

    .panel-text p {
      font-size: 1.02rem;
      color: #4d4d4d;
      max-width: 34ch;
      margin: 0 0 16px;
    }

    /* ... resto do teu CSS original continua abaixo ... */
  </style>
</head>
<body>

  <header class="topbar">
    <div class="container">
      <nav class="nav">
        <div class="brand">
          <!-- LOGO DISCRETO -->
          <img
            src="https://github.com/aala1966/xavier/blob/main/logoxavi.jpg?raw=true"
            alt="Logo Xavier Droneworks"
            class="brand-logo"
          />
          <div class="brand-title">XAVIER DRONEWORKS</div>
          <div class="brand-sub">CAPTURANDO NOVOS HORIZONTES</div>
        </div>

        <div class="nav-right">
          <div class="menu">
            <a href="#inicio">Início</a>
            <a href="#servicos">Serviços</a>
            <a href="#portfolio">Portfólio</a>
            <a href="#sobre">Sobre</a>
            <a href="#contacto">Contacto</a>
          </div>

          <div class="lang-switcher">
            <button class="lang-btn active" aria-label="Português">
              <span class="fi fi-pt"></span>
            </button>
            <button class="lang-btn" aria-label="Inglês">
              <span class="fi fi-gb"></span>
            </button>
          </div>

          <a href="#contacto" class="nav-cta">Peça um orçamento</a>
        </div>
      </nav>
    </div>
  </header>

  <!-- Aqui continua exatamente o resto do teu HTML original:
       secção hero, serviços, portfolio, etc.  -->
  <!-- Copia daqui para baixo o teu conteúdo tal como estava no ficheiro paste.txt -->

</body>
</html>
